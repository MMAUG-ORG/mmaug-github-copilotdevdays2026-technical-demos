name: Session 02 Challenge Submission
description: Submit your work for Session 02 VS Code plus Copilot challenge.
title: "[Session 02] Challenge submission: "
labels: [session-02, self-paced-submission]
body:
  - type: markdown
    attributes:
      value: "Use this form to submit your Session 02 challenge work."
  - type: input
    id: participant
    attributes:
      label: Participant name
      placeholder: Your full name
    validations:
      required: true
  - type: input
    id: challenge
    attributes:
      label: Challenge file
      placeholder: sessions/02-vscode-copilot/challenges/01-challenge.md
    validations:
      required: true
  - type: input
    id: preview
    attributes:
      label: Live preview URL
      placeholder: https://... optional but recommended
    validations:
      required: false
  - type: input
    id: repo
    attributes:
      label: Repository or branch URL
      placeholder: https://github.com/<user>/<repo>/tree/<branch>
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What did you implement?
    validations:
      required: true
